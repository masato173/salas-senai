<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salas · SENAI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#f3f4f6;
  --card:#fff;
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --accent:#2563eb;
  --green:#16a34a;
  --amber:#d97706;
  --purple:#7c3aed;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  gap:10px;
  flex-wrap:wrap;
}

.title{
  font-size:28px;
  font-weight:700;
}

.title span{
  color:var(--accent);
}

.status{
  font-size:13px;
  color:var(--muted);
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:20px;
}

.filters{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:180px;
  flex:1;
}

.field label{
  font-size:12px;
  font-weight:600;
  color:var(--muted);
}

.field input,
.field select{
  height:40px;
  border:1px solid var(--border);
  border-radius:8px;
  padding:0 12px;
  font-family:inherit;
  background:#fff;
}

.turnos{
  margin-top:14px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.turno-btn{
  border:none;
  border-radius:8px;
  padding:10px 14px;
  cursor:pointer;
  background:#e5e7eb;
  font-weight:600;
}

.turno-btn.ativo{
  background:var(--accent);
  color:#fff;
}

.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#f9fafb;
  text-align:left;
  font-size:12px;
  color:var(--muted);
  padding:12px;
  border-bottom:1px solid var(--border);
}

td{
  padding:14px 12px;
  border-bottom:1px solid var(--border);
}

.turma{
  display:inline-block;
  background:#dbeafe;
  color:#1d4ed8;
  padding:4px 8px;
  border-radius:6px;
  font-weight:600;
  font-size:12px;
}

.turno-tag{
  margin-left:8px;
  display:inline-block;
  padding:3px 7px;
  border-radius:6px;
  font-size:11px;
  font-weight:700;
}

.turno-tag.M{
  background:#fef3c7;
  color:#92400e;
}

.turno-tag.V{
  background:#dcfce7;
  color:#166534;
}

.turno-tag.N{
  background:#ede9fe;
  color:#5b21b6;
}

.turno-tag.sem{
  background:#e5e7eb;
  color:#6b7280;
}

.empty{
  text-align:center;
  padding:50px;
  color:var(--muted);
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-bottom:20px;
}

.stat{
  background:#fff;
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
}

.stat .n{
  font-size:28px;
  font-weight:700;
}

.stat .l{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

@media(max-width:700px){

  .stats{
    grid-template-columns:repeat(2,1fr);
  }

  .filters{
    flex-direction:column;
  }

}

</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div>
      <div class="title">
        Controle de <span>Salas</span>
      </div>

      <div class="status" id="status">
        Carregando...
      </div>
    </div>
  </div>

  <div class="stats">

    <div class="stat">
      <div class="n" id="sTotal">0</div>
      <div class="l">Registros</div>
    </div>

    <div class="stat">
      <div class="n" id="sFiltrados">0</div>
      <div class="l">Filtrados</div>
    </div>

    <div class="stat">
      <div class="n" id="sTurmas">0</div>
      <div class="l">Turmas</div>
    </div>

    <div class="stat">
      <div class="n" id="sSalas">0</div>
      <div class="l">Salas</div>
    </div>

  </div>

  <div class="card">

    <div class="filters">

      <div class="field">
        <label>Turma</label>
        <input type="text" id="fTurma">
      </div>

      <div class="field">
        <label>Data</label>
        <input type="date" id="fData">
      </div>

      <div class="field">
        <label>Sala</label>
        <select id="fSala">
          <option value="">Todas</option>
        </select>
      </div>

      <div class="field">
        <label>Mês</label>
        <select id="fMes">
          <option value="">Todos</option>
        </select>
      </div>

    </div>

    <div class="turnos">

      <button class="turno-btn ativo" data-turno="TODOS">
        Todos
      </button>

      <button class="turno-btn" data-turno="M">
        ☀ Matutino
      </button>

      <button class="turno-btn" data-turno="V">
        🌤 Vespertino
      </button>

      <button class="turno-btn" data-turno="N">
        🌙 Noturno
      </button>

    </div>

  </div>

  <div class="card table-wrap">

    <table>

      <thead>
        <tr>
          <th>Data</th>
          <th>Turma</th>
          <th>Sala</th>
        </tr>
      </thead>

      <tbody id="tbody">
      </tbody>

    </table>

  </div>

</div>

<script>

const API_URL = 'COLE_SUA_URL_AQUI';
const TOKEN = 'senai@2026';

let all = [];
let filtered = [];
let filtroTurno = 'TODOS';

const TURNO_LABEL = {
  M:'Matutino',
  V:'Vespertino',
  N:'Noturno'
};

async function load(){

  try{

    document.getElementById('status').textContent = 'Carregando...';

    const res = await fetch(
      `${API_URL}?token=${TOKEN}&nocache=true`
    );

    const json = await res.json();

    if(json.error){
      throw new Error(json.error);
    }

    all = json.dados || [];

    buildSelects();

    filter();

    document.getElementById('status').textContent =
      `${all.length} registros carregados`;

  }catch(err){

    document.getElementById('status').textContent =
      'Erro: ' + err.message;

    console.error(err);
  }
}

function filter(){

  const turma = document
    .getElementById('fTurma')
    .value
    .trim()
    .toUpperCase();

  const data = document
    .getElementById('fData')
    .value;

  const sala = document
    .getElementById('fSala')
    .value;

  const mes = document
    .getElementById('fMes')
    .value;

  filtered = all.filter(r => {

    if(
      turma &&
      !r.turma.toUpperCase().includes(turma)
    ){
      return false;
    }

    if(data && r.data !== data){
      return false;
    }

    if(sala && r.sala !== sala){
      return false;
    }

    if(mes && r.mes !== mes){
      return false;
    }

    if(
      filtroTurno !== 'TODOS' &&
      r.turno !== filtroTurno
    ){
      return false;
    }

    return true;
  });

  updateStats();

  render();
}

function render(){

  const tbody = document.getElementById('tbody');

  if(!filtered.length){

    tbody.innerHTML = `
      <tr>
        <td colspan="3" class="empty">
          Nenhum resultado encontrado
        </td>
      </tr>
    `;

    return;
  }

  tbody.innerHTML = filtered.map(r => {

    const turno = r.turno || null;

    const badge = turno
      ? `<span class="turno-tag ${turno}">
          ${TURNO_LABEL[turno]}
        </span>`
      : `<span class="turno-tag sem">—</span>`;

    return `
      <tr>

        <td>
          ${formatDate(r.data)}
        </td>

        <td>
          <span class="turma">
            ${r.turma}
          </span>

          ${badge}
        </td>

        <td>
          ${r.sala}
        </td>

      </tr>
    `;

  }).join('');
}

function buildSelects(){

  const salas = [...new Set(all.map(r => r.sala))];

  const meses = [...new Set(all.map(r => r.mes))];

  const salaSelect = document.getElementById('fSala');
  const mesSelect = document.getElementById('fMes');

  salaSelect.innerHTML =
    '<option value="">Todas</option>' +
    salas.map(s => `<option>${s}</option>`).join('');

  mesSelect.innerHTML =
    '<option value="">Todos</option>' +
    meses.map(m => `<option>${m}</option>`).join('');
}

function updateStats(){

  document.getElementById('sTotal').textContent =
    all.length;

  document.getElementById('sFiltrados').textContent =
    filtered.length;

  document.getElementById('sTurmas').textContent =
    new Set(filtered.map(r => r.turma)).size;

  document.getElementById('sSalas').textContent =
    new Set(filtered.map(r => r.sala)).size;
}

function formatDate(date){

  const d = new Date(date + 'T12:00:00');

  return d.toLocaleDateString('pt-BR');
}

document.getElementById('fTurma')
  .addEventListener('input', filter);

document.getElementById('fData')
  .addEventListener('change', filter);

document.getElementById('fSala')
  .addEventListener('change', filter);

document.getElementById('fMes')
  .addEventListener('change', filter);

document.querySelectorAll('.turno-btn')
  .forEach(btn => {

    btn.addEventListener('click', () => {

      filtroTurno = btn.dataset.turno;

      document
        .querySelectorAll('.turno-btn')
        .forEach(b => b.classList.remove('ativo'));

      btn.classList.add('ativo');

      filter();
    });

  });

load();

</script>

</body>
</html>
