<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salas · SENAI</title>

<!--
  CORREÇÕES DE SEGURANÇA APLICADAS:
  [1] CRÍTICO  — XSS: todos os dados da planilha agora passam por esc() antes de innerHTML
  [2] ALTO     — Headers: CSP, X-Frame-Options, X-Content-Type-Options, Referrer-Policy
  [3] ALTO     — e.message não mais exibido ao usuário (só no console interno)
  [4] MÉDIO    — console.warn removido de produção (não vaza arquitetura)
  [5] BAIXO    — Rate limit de cliques no botão refresh (debounce de 3s)
-->

<!-- Nota de segurança:
     XSS protegido via esc() em todo dado externo renderizado no HTML.
     CSP e referrer policy removidos — interferiam com o fetch ao Apps Script
     em ambiente GitHub Pages sem controle de headers HTTP reais. -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --border:   #e2e6ea;
  --text:     #0d1117;
  --muted:    #6b7280;
  --accent:   #0057ff;
  --accent-l: #e8effe;
  --green:    #16a34a;
  --green-l:  #dcfce7;
  --amber:    #b45309;
  --amber-l:  #fef3c7;
  --today-bg: #fffbeb;
  --today-bd: #fbbf24;
  --radius:   10px;
  --shadow:   0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:24px 16px 48px}
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap}
.header-title{font-size:22px;font-weight:700;letter-spacing:-.4px}
.header-title span{color:var(--accent)}
.header-meta{font-size:12px;color:var(--muted);margin-top:2px}
.status{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:5px 10px;border-radius:20px;background:var(--green-l);color:var(--green)}
.status.loading{background:var(--amber-l);color:var(--amber)}
.status.error{background:#fee2e2;color:#dc2626}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.status.ok .status-dot{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-val.accent{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;box-shadow:var(--shadow)}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:160px}
.field label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.field input,.field select{height:38px;padding:0 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--accent);background:#fff}
.field input::placeholder{color:var(--muted)}
.btn{height:38px;padding:0 16px;border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-ghost{background:var(--border);color:var(--text)}
.btn-ghost:hover{background:#d1d5db}
.turno-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px}
.turno-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.turno-btns{display:flex;gap:6px;flex-wrap:wrap}
.turno-btn{height:36px;padding:0 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.turno-btn:hover{border-color:var(--accent);color:var(--accent)}
.turno-btn.ativo{background:var(--accent);border-color:var(--accent);color:#fff}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.table-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);gap:8px;flex-wrap:wrap}
.table-title{font-weight:600;font-size:13px}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--accent-l);color:var(--accent)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
tr.today td{background:var(--today-bg)}
tr.today td:first-child{border-left:3px solid var(--today-bd);padding-left:13px}
.cell-date{font-size:13px;font-weight:500;white-space:nowrap}
.cell-date .day{display:block;font-size:11px;color:var(--muted);font-weight:400}
.today-pill{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:var(--today-bd);color:#78350f;padding:1px 6px;border-radius:4px;margin-right:6px;vertical-align:middle}
.turma{font-family:'SF Mono','Fira Code',monospace;font-size:12px;font-weight:600;background:var(--accent-l);color:var(--accent);padding:3px 8px;border-radius:5px;display:inline-block}
.sala-name{font-weight:500}
.sala-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;margin-left:6px}
.sala-tag.lab{background:var(--amber-l);color:var(--amber)}
.sala-tag.sala{background:var(--green-l);color:var(--green)}
.turno-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:6px;vertical-align:middle;white-space:nowrap}
.turno-badge.M{background:#fef3c7;color:#92400e}
.turno-badge.V{background:#dcfce7;color:#14532d}
.turno-badge.N{background:#ede9fe;color:#4c1d95}
.turno-badge.sem{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.empty{padding:64px 24px;text-align:center}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-text{font-size:15px;font-weight:600;color:var(--muted)}
.empty-sub{font-size:13px;color:var(--muted);margin-top:4px}
.skeleton{height:48px;background:linear-gradient(90deg,var(--bg) 25%,var(--border) 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-bottom:1px solid var(--border)}
@keyframes shimmer{to{background-position:-200% 0}}
.pager{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}
.pager-info{font-size:12px;color:var(--muted)}
.pager-btns{display:flex;gap:4px}
.pager-btn{min-width:32px;height:32px;padding:0 8px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.pager-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.pager-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pager-btn:disabled{opacity:.35;cursor:not-allowed}
.btn-refresh{background:none;border:none;cursor:pointer;color:var(--muted);font-size:16px;padding:4px;line-height:1;transition:color .15s,transform .3s}
.btn-refresh:hover{color:var(--accent)}
.btn-refresh.spinning{animation:spin .7s linear infinite}
.btn-refresh:disabled{opacity:.4;cursor:not-allowed}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .filters{flex-direction:column}
  .field{min-width:100%}
  .btn{width:100%}
  th,td{padding:10px 12px}
  .header-title{font-size:18px}
}
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div>
      <div class="header-title">Controle de <span>Salas</span></div>
      <div class="header-meta" id="headerMeta">SENAI · Carregando...</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="status loading" id="status">
        <span class="status-dot"></span>
        <span id="statusTxt">Carregando</span>
      </span>
      <!-- [5] debounce aplicado via JS — botão desabilitado por 3s após clique -->
      <button class="btn-refresh" id="btnRefresh" title="Atualizar" onclick="handleRefresh()">↻</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-val accent" id="sTotal">—</div><div class="stat-label">Registros</div></div>
    <div class="stat"><div class="stat-val green"  id="sFilt">—</div><div class="stat-label">Filtrados</div></div>
    <div class="stat"><div class="stat-val"        id="sTurma">—</div><div class="stat-label">Turmas</div></div>
    <div class="stat"><div class="stat-val"        id="sSala">—</div><div class="stat-label">Salas</div></div>
  </div>

  <div class="panel">
    <div class="filters">
      <div class="field" style="flex:2">
        <label>Turma</label>
        <input type="text" id="fTurma" placeholder="Ex: ADM, APB.ADM.119…"
               oninput="applyFilters()" maxlength="50" autocomplete="off">
      </div>
      <div class="field">
        <label>Data</label>
        <input type="date" id="fData" onchange="applyFilters()">
      </div>
      <div class="field">
        <label>Sala</label>
        <select id="fSala" onchange="applyFilters()"><option value="">Todas</option></select>
      </div>
      <div class="field">
        <label>Mês</label>
        <select id="fMes" onchange="applyFilters()"><option value="">Todos</option></select>
      </div>
      <button class="btn btn-primary" onclick="filterToday()">Hoje</button>
      <button class="btn btn-ghost"   onclick="resetFilters()">Limpar</button>
    </div>
    <div class="turno-row">
      <span class="turno-label">Turno</span>
      <div class="turno-btns">
        <button class="turno-btn ativo" data-turno="TODOS">Todos</button>
        <button class="turno-btn" data-turno="M">☀ Matutino</button>
        <button class="turno-btn" data-turno="V">🌤 Vespertino</button>
        <button class="turno-btn" data-turno="N">🌙 Noturno</button>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-bar">
      <span class="table-title">Resultados</span>
      <span class="badge" id="countBadge">—</span>
    </div>
    <div id="tableBody"></div>
    <div class="pager" id="pager" style="display:none">
      <span class="pager-info" id="pagerInfo"></span>
      <div class="pager-btns" id="pagerBtns"></div>
    </div>
  </div>

</div>
<script>
// =============================================================
// CONTROLE DE SALAS SENAI — Frontend
// Correções de segurança aplicadas neste arquivo:
//   [1] esc()       — escapa HTML antes de qualquer innerHTML
//   [2] loadData()  — não exibe e.message ao usuário
//   [3] buildSelects() — dados escapados antes do innerHTML
//   [4] console.warn removido (não vaza arquitetura em produção)
//   [5] handleRefresh() — debounce de 3s anti-spam
// =============================================================

var API_URL   = 'https://script.google.com/macros/s/AKfycbxjmmlDjf-d5URtrQxeYX8iSCogreqiiEzEZ692D-e7_siYbRD_CujnPLcyFeDkfonA/exec';
var API_TOKEN = 'senai@2026';
var PER_PAGE  = 40;
var DAYS      = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var TURNO_LABEL = { M: 'Matutino', V: 'Vespertino', N: 'Noturno' };

// ── ESTADO ────────────────────────────────────────────────────
var all         = [];
var filtered    = [];
var turnoMap    = {};
var filtroTurno = 'TODOS';
var page        = 1;
var refreshLock = false; // [5] trava de debounce para o refresh

// ── [1] CORREÇÃO CRÍTICA: escape de HTML ──────────────────────
// Converte caracteres especiais em entidades HTML seguras.
// DEVE ser chamada em QUALQUER dado externo antes de innerHTML.
// Sem isso: dado da planilha "<img src=x onerror=alert(1)>"
// seria executado como HTML no browser de todos os usuários.
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#x27;');
}

// ── Resolve turno suportando "APB.X/APB.Y" ────────────────────
function getTurno(turma) {
  var chave = turma.trim();
  if (turnoMap[chave]) return turnoMap[chave];
  var partes = chave.split('/');
  for (var i = 0; i < partes.length; i++) {
    var p = partes[i].trim();
    if (turnoMap[p]) return turnoMap[p];
  }
  return null;
}

// ── [5] Refresh com debounce de 3s ────────────────────────────
// Impede spam no botão que esgotaria a cota do Apps Script.
function handleRefresh() {
  if (refreshLock) return;
  refreshLock = true;
  var btn = document.getElementById('btnRefresh');
  btn.disabled = true;
  loadData();
  setTimeout(function() {
    refreshLock = false;
    btn.disabled = false;
  }, 3000);
}

// ── LOAD ──────────────────────────────────────────────────────
async function loadData() {
  setStatus('loading', 'Carregando…');
  document.getElementById('btnRefresh').classList.add('spinning');
  showSkeleton();

  try {
    var res  = await fetch(API_URL + '?token=' + encodeURIComponent(API_TOKEN));
    // Nota: Apps Script sempre retorna HTTP 200 e content-type text/plain
    // mesmo com setMimeType(JSON) — não é possível validar pelo header
    var data = await res.json();

    // [2] Não propagamos data.error direto ao usuário — pode conter info interna
    if (data.error) throw new Error('Falha ao carregar dados.');

    all      = data.dados    || [];
    turnoMap = data.turnoMap || {};

    // [4] Sem console.warn em produção — não vaza arquitetura

    buildSelects();
    applyFilters();

    var now = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    // textContent é seguro — não interpreta HTML
    document.getElementById('headerMeta').textContent = 'SENAI · Atualizado às ' + now;
    setStatus('ok', all.length.toLocaleString('pt-BR') + ' registros');

  } catch (e) {
    // Log interno — visível só no DevTools, não exposto ao usuário
    console.error('[SENAI] loadData erro:', e.name, e.message);
    setStatus('error', 'Erro ao carregar dados');
    var body = document.getElementById('tableBody');
    body.innerHTML = '';
    var div = document.createElement('div');
    div.className = 'empty';
    div.innerHTML =
      '<div class="empty-icon">⚠</div>' +
      '<div class="empty-text">Falha ao carregar</div>' +
      '<div class="empty-sub">Tente atualizar a página ou contate o suporte.</div>';
    body.appendChild(div);
  } finally {
    document.getElementById('btnRefresh').classList.remove('spinning');
  }
}

// ── FILTER ────────────────────────────────────────────────────
function applyFilters() {
  // Inputs de texto já são seguros aqui — usados só para comparação,
  // não inseridos em innerHTML diretamente
  var turma = document.getElementById('fTurma').value.trim().toUpperCase();
  var data  = document.getElementById('fData').value;
  var sala  = document.getElementById('fSala').value;
  var mes   = document.getElementById('fMes').value;

  filtered = all.filter(function(r) {
    if (turma && r.turma.toUpperCase().indexOf(turma) === -1) return false;
    if (data  && r.data !== data)  return false;
    if (sala  && r.sala !== sala)  return false;
    if (mes   && r.mes  !== mes)   return false;
    if (filtroTurno !== 'TODOS' && getTurno(r.turma) !== filtroTurno) return false;
    return true;
  }).sort(function(a, b) {
    return a.data.localeCompare(b.data) || a.sala.localeCompare(b.sala);
  });

  page = 1;
  updateStats();
  render();
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  var total = Math.ceil(filtered.length / PER_PAGE);
  var start = (page - 1) * PER_PAGE;
  var slice = filtered.slice(start, start + PER_PAGE);
  var hoje  = new Date().toISOString().slice(0, 10);
  var body  = document.getElementById('tableBody');

  // textContent é seguro para textos puros
  document.getElementById('countBadge').textContent =
    filtered.length + (filtered.length !== 1 ? ' resultados' : ' resultado');

  if (!filtered.length) {
    // Sem dados externos aqui — string literal estática, seguro
    body.innerHTML =
      '<div class="empty">' +
      '<div class="empty-icon">🔍</div>' +
      '<div class="empty-text">Nenhum resultado</div>' +
      '<div class="empty-sub">Tente ajustar os filtros</div>' +
      '</div>';
    document.getElementById('pager').style.display = 'none';
    return;
  }

  var rows = slice.map(function(r) {
    var d     = new Date(r.data + 'T12:00:00');
    var isHj  = r.data === hoje;
    var isLb  = r.sala.toLowerCase().indexOf('lab') !== -1;
    var turno = getTurno(r.turma);

    // [1] esc() aplicado em TODOS os campos vindos da planilha:
    // r.turma, r.sala — poderiam conter HTML malicioso se alguém editar a planilha
    var turmaEsc = esc(r.turma);
    var salaEsc  = esc(r.sala);

    // turno vem de TURNO_LABEL (objeto controlado) — não precisa de esc
    // mas o esc em TURNO_LABEL[turno] não causa problema e é defensivo
    var badge = turno
      ? '<span class="turno-badge ' + turno + '" title="' + esc(TURNO_LABEL[turno]) + '">' + esc(TURNO_LABEL[turno]) + '</span>'
      : '<span class="turno-badge sem">—</span>';

    // d.toLocaleDateString e DAYS[d.getDay()] são seguros (não vêm da planilha)
    return '<tr class="' + (isHj ? 'today' : '') + '">' +
      '<td class="cell-date">' +
        (isHj ? '<span class="today-pill">Hoje</span>' : '') +
        '<span>' + d.toLocaleDateString('pt-BR') + '</span>' +
        '<span class="day">' + DAYS[d.getDay()] + '</span>' +
      '</td>' +
      '<td><span class="turma">' + turmaEsc + '</span>' + badge + '</td>' +
      '<td><span class="sala-name">' + salaEsc + '</span>' +
        '<span class="sala-tag ' + (isLb ? 'lab' : 'sala') + '">' + (isLb ? 'Lab' : 'Sala') + '</span>' +
      '</td>' +
    '</tr>';
  }).join('');

  body.innerHTML =
    '<div class="table-scroll"><table>' +
    '<thead><tr><th>Data</th><th>Turma / Turno</th><th>Sala</th></tr></thead>' +
    '<tbody>' + rows + '</tbody>' +
    '</table></div>';

  renderPager(total);
}

// ── PAGER ─────────────────────────────────────────────────────
// Pager usa apenas números inteiros gerados pelo JS — sem dados externos, seguro
function renderPager(total) {
  var pager = document.getElementById('pager');
  if (total <= 1) { pager.style.display = 'none'; return; }
  pager.style.display = 'flex';

  var start = (page - 1) * PER_PAGE + 1;
  var end   = Math.min(page * PER_PAGE, filtered.length);
  // textContent — seguro
  document.getElementById('pagerInfo').textContent = start + '–' + end + ' de ' + filtered.length;

  var pages = [];
  for (var i = 1; i <= total; i++) {
    if (i === 1 || i === total || Math.abs(i - page) <= 1) pages.push(i);
  }

  // Apenas números inteiros no onclick — sem interpolação de string externa
  var html = '<button class="pager-btn" onclick="goPage(' + (page-1) + ')" ' + (page===1?'disabled':'') + '>‹</button>';
  var prev = null;
  pages.forEach(function(p) {
    if (prev && p - prev > 1) html += '<button class="pager-btn" disabled>…</button>';
    html += '<button class="pager-btn ' + (p===page?'active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
    prev = p;
  });
  html += '<button class="pager-btn" onclick="goPage(' + (page+1) + ')" ' + (page===total?'disabled':'') + '>›</button>';
  document.getElementById('pagerBtns').innerHTML = html;
}

function goPage(p) {
  page = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── HELPERS ───────────────────────────────────────────────────
function updateStats() {
  // textContent — seguro, não interpreta HTML
  document.getElementById('sTotal').textContent = all.length.toLocaleString('pt-BR');
  document.getElementById('sFilt').textContent  = filtered.length.toLocaleString('pt-BR');
  document.getElementById('sTurma').textContent = new Set(filtered.map(function(r){ return r.turma; })).size;
  document.getElementById('sSala').textContent  = new Set(filtered.map(function(r){ return r.sala; })).size;
}

function buildSelects() {
  var salas = Array.from(new Set(all.map(function(r){ return r.sala; }))).sort(function(a,b){
    return (parseInt(a)||9999) - (parseInt(b)||9999) || a.localeCompare(b);
  });
  var meses = Array.from(new Set(all.map(function(r){ return r.mes; })));

  var ss = document.getElementById('fSala');
  var sm = document.getElementById('fMes');

  // [1] esc() aplicado — sala e mes vêm da planilha, podem conter HTML
  ss.innerHTML = '<option value="">Todas</option>' +
    salas.map(function(s){ return '<option value="' + esc(s) + '">' + esc(s) + '</option>'; }).join('');
  sm.innerHTML = '<option value="">Todos</option>' +
    meses.map(function(m){ return '<option value="' + esc(m) + '">' + esc(m) + '</option>'; }).join('');

  ss.value = '';
  sm.value = '';
}

function filterToday() {
  document.getElementById('fData').value = new Date().toISOString().slice(0, 10);
  applyFilters();
}

function resetFilters() {
  document.getElementById('fTurma').value = '';
  document.getElementById('fData').value  = '';
  document.getElementById('fSala').value  = '';
  document.getElementById('fMes').value   = '';
  filtroTurno = 'TODOS';
  document.querySelectorAll('.turno-btn').forEach(function(b) {
    b.classList.toggle('ativo', b.dataset.turno === 'TODOS');
  });
  applyFilters();
}

function setStatus(type, txt) {
  document.getElementById('status').className = 'status ' + type;
  // textContent — seguro
  document.getElementById('statusTxt').textContent = txt;
}

function showSkeleton() {
  // String literal estática — sem dados externos, seguro
  document.getElementById('tableBody').innerHTML =
    [1,2,3,4,5].map(function(){ return '<div class="skeleton"></div>'; }).join('');
  document.getElementById('pager').style.display = 'none';
}

// ── BOTÕES DE TURNO ───────────────────────────────────────────
// data-turno vem do HTML controlado por nós, não da planilha
// Validação extra: só aceita valores conhecidos
var TURNOS_ACEITOS = { TODOS: true, M: true, V: true, N: true };
document.querySelectorAll('.turno-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var turno = btn.dataset.turno;
    // Valida que o valor é um dos esperados — evita injeção via dataset
    if (!TURNOS_ACEITOS[turno]) return;
    filtroTurno = turno;
    document.querySelectorAll('.turno-btn').forEach(function(b) {
      b.classList.remove('ativo');
    });
    btn.classList.add('ativo');
    applyFilters();
  });
});

// ── INIT ──────────────────────────────────────────────────────
loadData();
</script>
</body>
